version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: naibor-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=America/Chicago
    volumes:
      - n8n_data:/home/node/.n8n
      - ./:/home/node/site:ro
    networks:
      - naibor

  webhook-server:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    container_name: naibor-webhook
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - SITE_DIR=/site
      - PORT=3000
    volumes:
      - ./:/site
    networks:
      - naibor

  site:
    image: nginx:alpine
    container_name: naibor-site
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - naibor

volumes:
  n8n_data:

networks:
  naibor:
    driver: bridge
