server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(svg|ico|css|js|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
